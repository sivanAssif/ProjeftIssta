<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>איסתא סיטונאות — מעקב משותף</title>
<style>
  :root{
    --brand:#5A4CD6; --brand-soft:#EEEBFB; --ink:#1B1230; --body:#463B5C; --muted:#574C61;
    --dim:#8A8199; --line:#D6D4D9; --line2:#C3BFC7; --row:#EDEBF0; --page:#F6F4FB; --card:#fff;
    --ok:#1F8A54; --ok-bg:#E5F4EC; --warn:#B26A00; --crit:#C2382F;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI","Assistant","Rubik",system-ui,Arial,sans-serif;background:var(--page);color:var(--body);line-height:1.55}
  .wrap{max-width:1080px;margin:0 auto;padding:0 20px}
  h1,h2,h3{color:var(--ink);margin:0}
  a{color:var(--brand)}

  header.top{background:var(--brand);color:#fff;padding:24px 0 22px;margin-bottom:0}
  header.top .wrap{display:flex;flex-direction:column;gap:5px}
  header.top .kick{font-size:12.5px;font-weight:700;letter-spacing:.05em;opacity:.85}
  header.top h1{color:#fff;font-size:26px}
  header.top .sub{font-size:14px;opacity:.9}

  .namebar{background:var(--card);border-bottom:1px solid var(--line)}
  .namebar .wrap{display:flex;align-items:center;gap:10px;padding:11px 20px;flex-wrap:wrap;font-size:14px}
  .namebar input{font-family:inherit;font-size:14px;border:1px solid var(--line);border-radius:7px;padding:7px 11px;min-width:200px}
  .btn{font-family:inherit;font-size:13.5px;font-weight:600;border:none;background:var(--brand);color:#fff;border-radius:7px;padding:8px 15px;cursor:pointer}
  .btn.ghost{background:none;color:var(--brand);border:1px solid var(--brand)}
  .save{font-size:12.5px;font-weight:600;margin-inline-start:auto}
  .save.saved{color:var(--ok)} .save.saving{color:var(--warn)} .save.pending{color:var(--crit)}

  .intro{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin:22px 0}
  .intro h2{font-size:19px;margin-bottom:10px}
  .intro .ey{font-size:12px;font-weight:700;letter-spacing:.06em;color:var(--brand);text-transform:uppercase;margin:14px 0 6px}
  .intro p{font-size:14.5px;margin:0}
  .intro ul{margin:6px 0 0;padding-inline-start:20px;font-size:14.5px}
  .intro li{margin-bottom:4px}

  section.tbl{margin:26px 0}
  .sechead{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .sechead h2{font-size:20px}
  .sechead .note{font-size:12.5px;color:var(--dim)}
  .tblwrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;background:var(--card)}
  table{border-collapse:collapse;width:100%;font-size:14px}
  th,td{text-align:right;padding:11px 13px;border-bottom:1px solid var(--line);vertical-align:top}
  th{background:var(--brand-soft);color:var(--ink);font-weight:700;font-size:12.5px;white-space:nowrap}
  tr:last-child td{border-bottom:none}
  .edit{display:inline-block;min-width:60px;min-height:20px;outline:none;border-radius:5px;padding:2px 5px;margin:-2px -5px}
  .edit:focus{background:var(--brand-soft);box-shadow:0 0 0 2px var(--brand)}
  .due.past{color:var(--crit);font-weight:700} .due.soon{color:var(--warn);font-weight:700}
  .num{font-variant-numeric:tabular-nums}
  select.cell{font-family:inherit;font-size:13px;border:1px solid var(--line);border-radius:6px;padding:5px 8px;cursor:pointer;background:#fff;color:var(--ink)}
  .doclink{display:inline-flex;align-items:center;color:var(--brand);text-decoration:none;vertical-align:middle}
  .linkbtn{display:inline-flex;align-items:center;gap:5px}
  .addlink{font-family:inherit;font-size:12px;font-weight:500;border:1px dashed var(--line2);background:none;color:var(--dim);border-radius:6px;padding:3px 9px;cursor:pointer}
  .linkedit{display:inline-flex;align-items:center;border:none;background:none;color:var(--dim);cursor:pointer;padding:0}
  .xbtn{border:none;background:none;color:var(--dim);cursor:pointer;font-size:15px;line-height:1}
  .xbtn:hover{color:var(--crit)}
  .addrow{margin-top:10px;font-family:inherit;font-size:13.5px;font-weight:600;border:1px dashed var(--line2);background:none;color:var(--brand);border-radius:9px;padding:9px 15px;cursor:pointer;width:100%}
  .addrow:hover{border-color:var(--brand)}
  .foot{height:70px}
  @media (max-width:640px){ header.top h1{font-size:21px} }
</style>
</head>
<body>

<header class="top"><div class="wrap">
  <span class="kick">איסתא סיטונאות · מעקב משותף</span>
  <h1>מעקב משותף — הגדרות סביבה ומשימות המשך</h1>
  <span class="sub">עדכון בזמן אמת מול צוות הפרויקט. מה שמעדכנים כאן נשמר מיד ונראה לשני הצדדים.</span>
</div></header>

<div class="namebar"><div class="wrap" id="nameBar"></div></div>

<div class="wrap">

  <div id="app"></div>

  <div class="foot"></div>
</div>

<script>
const STATUSES = ["טרם התחיל","בתהליך","חסום","הושלם","בסיכון"];
const API = "/api/data";
let ST = {env:[], follow:[]};
let pendingHist = [];
let saveTimer=null, pendingSave=false;
let clientName = localStorage.getItem("isstaClientName") || "";

function nowStamp(){
  const n=new Date();
  return `${n.getDate()}.${n.getMonth()+1}.${n.getFullYear()} ${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`;
}
function esc(s){ const d=document.createElement("div"); d.textContent=s==null?"":s; return d.innerHTML; }
function parseDue(str){
  if(!str) return null;
  const m=String(str).trim().match(/^(\d{1,2})[.\/](\d{1,2})(?:[.\/](\d{2,4}))?$/);
  if(!m) return null;
  let y=m[3]?+m[3]:new Date().getFullYear(); if(y<100)y+=2000;
  return new Date(y,(+m[2])-1,+m[1]);
}
function dueClass(str){
  const d=parseDue(str); if(!d) return "";
  const t=new Date(); t.setHours(0,0,0,0);
  const diff=(d-t)/86400000;
  if(diff<0) return "past"; if(diff<7) return "soon"; return "";
}

function setSave(state,txt){
  const el=document.getElementById("saveState");
  if(el){ el.className="save "+state; el.textContent=txt; }
}
function queueSave(){
  pendingSave=true; setSave("saving","שומר…");
  clearTimeout(saveTimer); saveTimer=setTimeout(save,1500);
}
async function save(){
  const histSnap=pendingHist.slice();
  const body=JSON.stringify({env:ST.env, follow:ST.follow, hist:histSnap});
  try{
    const r=await fetch(API,{method:"PUT",headers:{"Content-Type":"application/json","X-User":encodeURIComponent(clientName||"לקוח")},body});
    if(!r.ok) throw 0;
    pendingHist.splice(0,histSnap.length);
    pendingSave=false; setSave("saved","✓ נשמר ומשותף");
  }catch(e){
    setSave("pending","ממתין לשמירה…"); clearTimeout(saveTimer); saveTimer=setTimeout(save,4000);
  }
}
function change(msg,fn){ fn(); if(msg) pendingHist.push({ts:nowStamp(),a:msg}); render(); queueSave(); }

/* ---- cell helpers ---- */
function editableCell(item,field,label,tableName){
  const span=document.createElement("span"); span.className="edit"; span.contentEditable="true"; span.textContent=item[field]||"";
  let before="";
  span.addEventListener("focus",()=>before=span.textContent);
  span.addEventListener("blur",()=>{ const v=span.textContent.trim(); if(v!==before.trim()) change(`עודכן ${label} (${tableName}): ${v.slice(0,50)}`,()=>{item[field]=v;}); });
  span.addEventListener("keydown",e=>{ if(e.key==="Enter"){e.preventDefault();span.blur();} });
  return span;
}
function dueCell(item,field,tableName){
  const td=document.createElement("td");
  const span=editableCell(item,field,"תאריך יעד",tableName); span.classList.add("due","num");
  const c=item.s===3?"":dueClass(item[field]); if(c) span.classList.add(c);
  td.appendChild(span); return td;
}
function statusCell(item,tableName){
  const td=document.createElement("td");
  const sel=document.createElement("select"); sel.className="cell";
  STATUSES.forEach((st,i)=>{ const o=document.createElement("option"); o.value=i; o.textContent=st; if((item.s||0)===i)o.selected=true; sel.appendChild(o); });
  sel.onchange=()=>{ const ns=+sel.value; change(`סטטוס עודכן ל-${STATUSES[ns]} (${tableName}): ${(item.t||"").slice(0,50)}`,()=>{item.s=ns;}); };
  td.appendChild(sel); return td;
}
function yesNoCell(item,tableName){
  const td=document.createElement("td");
  const sel=document.createElement("select"); sel.className="cell";
  [["no","לא"],["yes","כן"]].forEach(([v,txt])=>{ const o=document.createElement("option"); o.value=v; o.textContent=txt; if((!!item.done?"yes":"no")===v)o.selected=true; sel.appendChild(o); });
  sel.onchange=()=>{ const nv=sel.value==="yes"; change(`בוצע ${nv?"כן":"לא"} (${tableName}): ${(item.t||"").slice(0,50)}`,()=>{item.done=nv;}); };
  td.appendChild(sel); return td;
}
function linkCell(item,field,addLabel,tableName){
  const td=document.createElement("td");
  const span=document.createElement("span"); span.className="linkbtn";
  const editLink=()=>{ const raw=prompt("הדביקו קישור:",item[field]||""); if(raw===null)return; const v=raw.trim(); if(v===(item[field]||""))return; change(v?`עודכן לינק (${tableName})`:`הוסר לינק (${tableName})`,()=>{ if(v)item[field]=v; else delete item[field]; }); };
  if(item[field]){
    const a=document.createElement("a"); a.href=item[field]; a.target="_blank"; a.rel="noopener"; a.className="doclink"; a.title="פתיחת המסמך";
    a.innerHTML='<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>';
    const ed=document.createElement("button"); ed.className="linkedit"; ed.title="עריכת לינק"; ed.onclick=editLink;
    ed.innerHTML='<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>';
    span.appendChild(a); span.appendChild(ed);
  }else{
    const b=document.createElement("button"); b.className="addlink"; b.textContent="+ "+addLabel; b.onclick=editLink; span.appendChild(b);
  }
  td.appendChild(span); return td;
}
function delCell(arr,item,tableName){
  const td=document.createElement("td");
  const b=document.createElement("button"); b.className="xbtn"; b.textContent="✕"; b.title="ביטול שורה";
  b.onclick=()=>{ if(confirm("לבטל את השורה?")) change(`בוטלה שורה (${tableName}): ${(item.t||"").slice(0,50)}`,()=>{ item.x=true; }); };
  td.appendChild(b); return td;
}
function tdWrap(node){ const td=document.createElement("td"); td.appendChild(node); return td; }
function roCell(item,field){
  const td=document.createElement("td");
  const sp=document.createElement("span");
  if(item[field]){ sp.textContent=item[field]; } else { sp.textContent="יוקצה על ידי הצוות"; sp.style.color="var(--dim)"; sp.style.fontSize="12.5px"; }
  td.appendChild(sp); return td;
}

function buildTable(arr,cols,tableName){
  const wrap=document.createElement("div"); wrap.className="tblwrap";
  const t=document.createElement("table");
  const thead=document.createElement("thead"); const hr=document.createElement("tr");
  cols.forEach(c=>{ const th=document.createElement("th"); th.textContent=c.h; hr.appendChild(th); });
  hr.appendChild(document.createElement("th")); thead.appendChild(hr); t.appendChild(thead);
  const tb=document.createElement("tbody");
  arr.filter(it=>!it.x).forEach(it=>{
    const tr=document.createElement("tr");
    cols.forEach(c=>{ const n=c.render(it); tr.appendChild(n.tagName==="TD"?n:tdWrap(n)); });
    tr.appendChild(delCell(arr,it,tableName));
    tb.appendChild(tr);
  });
  if(!arr.filter(it=>!it.x).length){
    const tr=document.createElement("tr"); tr.innerHTML=`<td colspan="${cols.length+1}" style="color:var(--dim)">אין עדיין שורות — הוסיפו למטה</td>`; tb.appendChild(tr);
  }
  t.appendChild(tb); wrap.appendChild(t); return wrap;
}
function addRowBtn(label,arr,mk,msg){
  const b=document.createElement("button"); b.className="addrow"; b.textContent="+ "+label;
  b.onclick=()=> change(msg,()=>{ arr.push(mk()); });
  return b;
}

function section(title,note,tableNode,addNode){
  const s=document.createElement("section"); s.className="tbl";
  const head=document.createElement("div"); head.className="sechead";
  head.innerHTML=`<h2>${esc(title)}</h2><span class="note">${esc(note)}</span>`;
  s.appendChild(head); s.appendChild(tableNode); s.appendChild(addNode);
  return s;
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  const envTbl=buildTable(ST.env,[
    {h:"נושא", render:it=>editableCell(it,"t","נושא","הגדרות סביבה")},
    {h:"אחראי", render:it=>roCell(it,"o")},
    {h:"תאריך יעד", render:it=>dueCell(it,"d","הגדרות סביבה")},
    {h:"בוצע", render:it=>yesNoCell(it,"הגדרות סביבה")},
    {h:"הערות", render:it=>editableCell(it,"note","הערות","הגדרות סביבה")},
    {h:"לינק", render:it=>linkCell(it,"docl","הוספת לינק","הגדרות סביבה")},
  ],"הגדרות סביבה");
  const envAdd=addRowBtn("הוספת שורה",ST.env,()=>({t:"נושא חדש — לחצו לעריכה",o:"",d:"",done:false,note:""}),"נוספה שורת הגדרות סביבה");
  app.appendChild(section("הגדרות סביבה","",envTbl,envAdd));

  const fuTbl=buildTable(ST.follow,[
    {h:"נושא", render:it=>editableCell(it,"t","נושא","Follow up")},
    {h:"אחראי", render:it=>roCell(it,"o")},
    {h:"סטטוס", render:it=>statusCell(it,"Follow up")},
    {h:"תאריך יעד", render:it=>dueCell(it,"d","Follow up")},
    {h:"הערות", render:it=>editableCell(it,"note","הערות","Follow up")},
    {h:"לינק", render:it=>linkCell(it,"docl","הוספת לינק","Follow up")},
  ],"Follow up");
  const fuAdd=addRowBtn("הוספת שורה",ST.follow,()=>({t:"נושא חדש — לחצו לעריכה",o:"",d:"",note:"",s:0}),"נוספה שורת Follow up");
  app.appendChild(section("Follow up","",fuTbl,fuAdd));
}

function renderNameBar(){
  const bar=document.getElementById("nameBar");
  bar.innerHTML="";
  if(!clientName){
    const lbl=document.createElement("span"); lbl.textContent="לפני שמתחילים — מה שמך? (ירשם ליד כל עדכון שלך)";
    const inp=document.createElement("input"); inp.type="text"; inp.placeholder="השם שלך"; inp.id="nameInp";
    const b=document.createElement("button"); b.className="btn"; b.textContent="שמירה";
    const submit=()=>{ const v=inp.value.trim(); if(!v)return; clientName=v; localStorage.setItem("isstaClientName",v); renderNameBar(); };
    b.onclick=submit; inp.addEventListener("keydown",e=>{ if(e.key==="Enter")submit(); });
    bar.append(lbl,inp,b);
    setTimeout(()=>inp.focus(),50);
  }else{
    const who=document.createElement("span"); who.innerHTML=`מעדכנים כ: <b>${esc(clientName)}</b>`;
    const ch=document.createElement("button"); ch.className="btn ghost"; ch.textContent="שינוי שם";
    ch.onclick=()=>{ clientName=""; localStorage.removeItem("isstaClientName"); renderNameBar(); };
    const st=document.createElement("span"); st.id="saveState"; st.className="save saved"; st.textContent="✓ נשמר ומשותף";
    bar.append(who,ch,st);
  }
}

async function load(){
  try{
    const r=await fetch(API+"?_="+Date.now(),{cache:"no-store"});
    if(!r.ok) throw 0;
    const d=await r.json();
    ST={env:Array.isArray(d.env)?d.env:[], follow:Array.isArray(d.follow)?d.follow:[]};
    render(); return true;
  }catch(e){ return false; }
}
async function poll(){
  if(pendingSave || (document.activeElement && document.activeElement.isContentEditable)) return;
  try{
    const r=await fetch(API+"?_="+Date.now(),{cache:"no-store"});
    if(!r.ok) return;
    const d=await r.json();
    const fresh={env:Array.isArray(d.env)?d.env:[], follow:Array.isArray(d.follow)?d.follow:[]};
    if(JSON.stringify(fresh)!==JSON.stringify(ST)){ ST=fresh; render(); }
  }catch(e){}
}

(async ()=>{
  renderNameBar();
  let ok=await load();
  let tries=0;
  while(!ok && tries<5){ await new Promise(r=>setTimeout(r,3000)); ok=await load(); tries++; }
  setInterval(poll,20000);
})();
</script>
</body>
</html>
